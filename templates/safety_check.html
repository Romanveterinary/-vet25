{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="text-center">Повідомити про підозрілий продукт</h2>
            <p class="text-center text-muted">Ваше звернення допоможе зробити продукти безпечнішими. Надана інформація буде перевірена спеціалістами.</p>
            
            <form method="POST" enctype="multipart/form-data" class="mt-4">
                <div class="mb-3">
                    <label for="submitter_name" class="form-label">Ваше прізвище та ім'я</label>
                    <input type="text" class="form-control" id="submitter_name" name="submitter_name" required>
                </div>
                <div class="mb-3">
                    <label for="location" class="form-label">Місце зйомки (місто, магазин, ринок тощо) ваш номер телефону</label>
                    <input type="text" class="form-control" id="location" name="location" required>
                </div>
                <div class="mb-3">
                    <label for="circumstances" class="form-label">Опишіть обставини (що саме викликало підозру?)</label>
                    <textarea class="form-control" id="circumstances" name="circumstances" rows="4" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="photo" class="form-label">Прикріпіть фото</label>
                    <input type="file" class="form-control" id="photo" name="photo" accept="image/*" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-danger">Відправити звернення</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
